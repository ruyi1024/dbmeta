# 一键启动：MySQL + Redis + 应用（构建镜像见下方 README）
# 在仓库根目录执行：docker compose -f docker/docker-compose.yml up -d --build

services:
  mysql:
    image: mysql:8.0
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: dbmeta
      MYSQL_USER: dbmeta
      MYSQL_PASSWORD: dbmeta
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 30
    ports:
      - "3306:3306"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: dbmeta-core:latest
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8086:8086"
    volumes:
      - ./setting.docker.yml:/app/setting.yml:ro

volumes:
  mysql_data:
