log:
  path: "/tmp/dbmeta.log"
  level: "info"
  debug: false

# HTTP（可选）。不设 server.addr 时：开源版默认 :8086；企业版二进制在未配置时默认 :8088，便于与开源同时本地调试。
# 需固定端口或生产部署时取消注释，例如：
# server:
#   addr: ":8086"

# License（商业部署须使用有效 LICENSE.ENC，并关闭以下跳过项）
# 可选跳过方式（任选其一即可，无需 LICENSE.ENC）：
#   - 本配置 license.devSkip: true（仅建议本地开发）
#   - 环境变量 DBMETA_LICENSE_SKIP=1（或 true/yes/on）
#   - 开源构建：go build -tags opensource
license:
  devSkip: false

token:
  storage: "mysql"
  key: "S9p2+dsfM1CzLF=="
  name: "dbmeta"
  expired: "3d"

decrypt:
  signKey: "1234567890abcdef"
  dbPassKey: "L1e2p3u4s5Abc321"

dataSource:
  #mysql
  host: 127.0.0.1
  port: 3306
  user: xxxxxx
  password: xxxxxx
  database: xxxxxx
  #redis
  redisHost: 127.0.0.1
  redisPort: 6379
  redisPassword: xxxxxx
