<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>元数据大盘UI测试 - 简化版</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/antd/4.24.8/antd.min.css" rel="stylesheet">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
        }
        
        .page-container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .page-title {
            font-size: 24px;
            font-weight: 600;
            color: #262626;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .statistic-section {
            margin-bottom: 32px;
        }
        
        .statistic-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .statistic-card {
            background: white;
            border: 1px solid #d9d9d9;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .statistic-card:hover {
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
            transform: translateY(-2px);
        }
        
        .statistic-title {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 14px;
            color: #8c8c8c;
            margin-bottom: 8px;
        }
        
        .statistic-value {
            font-size: 28px;
            font-weight: 600;
            color: #262626;
            margin-bottom: 4px;
        }
        
        .statistic-status {
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 12px;
            color: white;
        }
        
        .status-default { background-color: #d9d9d9; }
        .status-success { background-color: #52c41a; }
        .status-processing { background-color: #1890ff; }
        .status-warning { background-color: #faad14; }
        
        .charts-section {
            margin-top: 32px;
        }
        
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 16px;
        }
        
        .chart-card {
            background: white;
            border: 1px solid #d9d9d9;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            overflow: hidden;
        }
        
        .chart-card:hover {
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
            transform: translateY(-2px);
        }
        
        .chart-header {
            padding: 16px 24px;
            border-bottom: 1px solid #f0f0f0;
            background: #fafafa;
        }
        
        .chart-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
            font-weight: 600;
            color: #262626;
        }
        
        .chart-content {
            padding: 24px;
            height: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8c8c8c;
            font-size: 14px;
        }
        
        @media (max-width: 768px) {
            .statistic-cards {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                gap: 12px;
            }
            
            .charts-grid {
                grid-template-columns: 1fr;
            }
            
            .chart-content {
                height: 250px;
            }
        }
    </style>
</head>
<body>
    <div class="page-container">
        <div class="page-title">元数据概览大盘</div>
        
        <!-- 统计卡片区域 -->
        <div class="statistic-section">
            <div class="statistic-cards">
                <div class="statistic-card">
                    <div class="statistic-title">
                        <span style="font-size: 16px;">🔗</span>
                        数据源类型
                    </div>
                    <div class="statistic-value">12</div>
                    <div class="statistic-status status-default">默认</div>
                </div>
                
                <div class="statistic-card">
                    <div class="statistic-title">
                        <span style="font-size: 16px;">🏢</span>
                        机房数量
                    </div>
                    <div class="statistic-value">5</div>
                    <div class="statistic-status status-success">正常</div>
                </div>
                
                <div class="statistic-card">
                    <div class="statistic-title">
                        <span style="font-size: 16px;">🌍</span>
                        环境数量
                    </div>
                    <div class="statistic-value">8</div>
                    <div class="statistic-status status-processing">处理中</div>
                </div>
                
                <div class="statistic-card">
                    <div class="statistic-title">
                        <span style="font-size: 16px;">💻</span>
                        实例总数
                    </div>
                    <div class="statistic-value">156</div>
                    <div class="statistic-status status-warning">警告</div>
                </div>
                
                <div class="statistic-card">
                    <div class="statistic-title">
                        <span style="font-size: 16px;">🗄️</span>
                        数据库数
                    </div>
                    <div class="statistic-value">89</div>
                    <div class="statistic-status status-success">正常</div>
                </div>
                
                <div class="statistic-card">
                    <div class="statistic-title">
                        <span style="font-size: 16px;">📋</span>
                        数据表数
                    </div>
                    <div class="statistic-value">2,345</div>
                    <div class="statistic-status status-processing">处理中</div>
                </div>
                
                <div class="statistic-card">
                    <div class="statistic-title">
                        <span style="font-size: 16px;">📝</span>
                        字段总数
                    </div>
                    <div class="statistic-value">18,234</div>
                    <div class="statistic-status status-warning">警告</div>
                </div>
            </div>
        </div>
        
        <!-- 图表区域 -->
        <div class="charts-section">
            <div class="charts-grid">
                <div class="chart-card">
                    <div class="chart-header">
                        <div class="chart-title">
                            <span style="color: #1890ff;">📊</span>
                            数据源实例分布
                        </div>
                    </div>
                    <div class="chart-content">
                        数据源实例分布图表区域<br>
                        (此处集成实际的图表组件)
                    </div>
                </div>
                
                <div class="chart-card">
                    <div class="chart-header">
                        <div class="chart-title">
                            <span style="color: #1890ff;">🗄️</span>
                            数据库分布
                        </div>
                    </div>
                    <div class="chart-content">
                        数据库分布图表区域<br>
                        (此处集成实际的图表组件)
                    </div>
                </div>
                
                <div class="chart-card">
                    <div class="chart-header">
                        <div class="chart-title">
                            <span style="color: #1890ff;">📋</span>
                            数据表分布
                        </div>
                    </div>
                    <div class="chart-content">
                        数据表分布图表区域<br>
                        (此处集成实际的图表组件)
                    </div>
                </div>
                
                <div class="chart-card">
                    <div class="chart-header">
                        <div class="chart-title">
                            <span style="color: #1890ff;">📝</span>
                            数据字段分布
                        </div>
                    </div>
                    <div class="chart-content">
                        数据字段分布图表区域<br>
                        (此处集成实际的图表组件)
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 模拟数据加载效果
        setTimeout(() => {
            console.log('元数据大盘UI测试页面加载完成');
        }, 1000);
    </script>
</body>
</html>
